# ============================================================
# 第一步：日志配置
#   控制应用日志输出到哪里、记录什么级别
# ============================================================
logging:
  # --- 文件日志：写入磁盘，方便事后排查 ---
  file:
    enable: true          # 是否开启文件日志
    level: INFO           # 日志级别：DEBUG < INFO < WARNING < ERROR，INFO 表示记录及以上的日志
    path: logs            # 日志文件存放目录
    rotation: "10 MB"     # 单个日志文件超过 10MB 就自动轮转（创建新文件）
    retention: "7 days"   # 日志保留 7 天，超过的自动删除
  # --- 控制台日志：直接打印到终端，开发调试用 ---
  console:
    enable: true          # 是否开启控制台日志
    level: INFO           # 控制台日志级别

# ============================================================
# 第二步：元数据库连接配置
#   meta 库：存储表结构、字段描述、业务元数据等
#   应用通过这些信息理解"有哪些表、字段是什么意思"
# ============================================================
db_meta:
  host: localhost         # 数据库地址
  port: 3306              # MySQL 默认端口
  user: whf               # 用户名
  password: whf200311     # 密码
  database: meta          # 数据库名

# ============================================================
# 第三步：数仓连接配置
#   dw 库：存放实际业务数据（订单、用户、交易等）
#   agent 查询 SQL 时最终访问的就是这个库
# ============================================================
db_dw:
  host: localhost
  port: 3306
  user: whf
  password: whf200311
  database: dw

# ============================================================
# 第四步：Qdrant 向量数据库配置
#   用于存储和检索文本的向量表示
#   场景：用户提问 → 转成向量 → 在 Qdrant 中找最相似的文档/字段描述
# ============================================================
qdrant:
  host: localhost         # Qdrant 服务地址
  port: 6333              # Qdrant 默认端口
  embedding_size: 1024    # 向量维度，bge-large-zh-v1.5 模型输出 1024 维

# ============================================================
# 第五步：Embedding 模型服务配置
#   把文本转成向量的服务（调用 bge-large-zh-v1.5 模型）
#   流程：文本 → Embedding 服务 → 1024 维向量 → 存入 Qdrant 或用于相似度计算
# ============================================================
embedding:
  host: localhost         # 模型服务地址
  port: 8081              # 模型服务端口
  model: BAAI/bge-large-zh-v1.5  # 使用的模型名称（中文语义向量模型）

# ============================================================
# 第六步：Elasticsearch 配置
#   全文搜索引擎，用于关键词检索
#   场景：用户提问中的关键词 → ES 搜索相关表/字段/文档
# ============================================================
es:
  host: 127.0.0.1         # ES 服务地址
  port: 9200              # ES 默认端口
  index_name: data_agent  # 索引名（相当于数据库中的"表"）

# ============================================================
# 第七步：大语言模型（LLM）配置
#   agent 的"大脑"，负责理解用户问题、生成 SQL、解释结果
# ============================================================
llm:
  model_name: mimo-v2.5-pro      # 使用的模型
  api_key: tp-c8b52wwdqstwexm7qvj43dyurbv5ufjhhybeywarjzejwq27  # API 密钥
  base_url: https://api.openai-proxy.org/v1  # API 地址（兼容 OpenAI 接口格式）
