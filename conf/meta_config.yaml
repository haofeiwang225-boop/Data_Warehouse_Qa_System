tables:
  - name: dim_region
    role: dim
    description: Region dimension table for order geographic attributes.
    columns:
      - name: region_id
        role: primary_key
        description: Unique region identifier.
        alias: [region id, area id]
        sync: false
      - name: province
        role: dimension
        description: Province of the order region.
        alias: [province, province name]
        sync: true
      - name: region_name
        role: dimension
        description: Business region name.
        alias: [region, area, district]
        sync: true
      - name: country
        role: dimension
        description: Country name.
        alias: [country, country name]
        sync: true

  - name: dim_customer
    role: dim
    description: Customer dimension table.
    columns:
      - name: customer_id
        role: primary_key
        description: Unique customer identifier.
        alias: [customer id, user id]
        sync: false
      - name: customer_name
        role: dimension
        description: Customer name.
        alias: [customer name, user name]
        sync: true
      - name: gender
        role: dimension
        description: Customer gender.
        alias: [gender, sex]
        sync: true
      - name: member_level
        role: dimension
        description: Customer membership level.
        alias: [member level, user level]
        sync: true

  - name: dim_product
    role: dim
    description: Product dimension table.
    columns:
      - name: product_id
        role: primary_key
        description: Unique product identifier.
        alias: [product id, sku id]
        sync: false
      - name: product_name
        role: dimension
        description: Product name.
        alias: [product name, item name]
        sync: true
      - name: category
        role: dimension
        description: Product category.
        alias: [category, product category]
        sync: true
      - name: brand
        role: dimension
        description: Product brand.
        alias: [brand, brand name]
        sync: true

  - name: dim_date
    role: dim
    description: Date dimension table.
    columns:
      - name: date_id
        role: primary_key
        description: Date identifier in yyyyMMdd format.
        alias: [date id, date]
        sync: false
      - name: year
        role: dimension
        description: Year.
        alias: [year]
        sync: false
      - name: quarter
        role: dimension
        description: Quarter.
        alias: [quarter]
        sync: true
      - name: month
        role: dimension
        description: Month.
        alias: [month]
        sync: false
      - name: day
        role: dimension
        description: Day.
        alias: [day]
        sync: false

  - name: fact_order
    role: fact
    description: Order fact table with quantity and amount measures.
    columns:
      - name: order_id
        role: primary_key
        description: Unique order identifier.
        alias: [order id]
        sync: false
      - name: customer_id
        role: foreign_key
        description: Foreign key to dim_customer.
        alias: [customer id, user id]
        sync: false
      - name: product_id
        role: foreign_key
        description: Foreign key to dim_product.
        alias: [product id, sku id]
        sync: false
      - name: date_id
        role: foreign_key
        description: Foreign key to dim_date.
        alias: [date id, order date]
        sync: false
      - name: region_id
        role: foreign_key
        description: Foreign key to dim_region.
        alias: [region id, area id]
        sync: false
      - name: order_quantity
        role: measure
        description: Purchased item quantity in the order.
        alias: [quantity, order quantity, sales volume]
        sync: false
      - name: order_amount
        role: measure
        description: Monetary amount of the order.
        alias: [amount, order amount, sales amount, revenue]
        sync: false

metrics:
  - name: GMV
    description: Gross Merchandise Value, the sum of order_amount across orders.
    relevant_columns:
      - fact_order.order_amount
    alias: [gross merchandise value, total sales, total order amount]

  - name: AOV
    description: Average Order Value, calculated as total order_amount divided by order count.
    relevant_columns:
      - fact_order.order_amount
    alias: [average order value, average order amount]
